<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Server Test - Dual User</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #1a1a1a;
        color: #fff;
        height: 100vh;
        overflow: hidden;
      }

      .container {
        display: flex;
        height: 100vh;
        gap: 10px;
        padding: 10px;
        background: #0a0a0a;
      }

      .player-section {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: #1a1a1a;
        border: 2px solid #444;
        border-radius: 8px;
        overflow: hidden;
      }

      .header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 15px;
        font-weight: bold;
        font-size: 18px;
        border-bottom: 2px solid #444;
      }

      .header.player2 {
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      }

      .status {
        padding: 10px 15px;
        background: #0d0d0d;
        border-bottom: 1px solid #333;
        font-size: 12px;
      }

      .status-item {
        display: flex;
        justify-content: space-between;
        margin: 5px 0;
      }

      .status-label {
        color: #888;
      }

      .status-value {
        color: #4ade80;
        font-weight: bold;
      }

      .controls {
        padding: 15px;
        background: #0d0d0d;
        border-bottom: 1px solid #333;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .controls input {
        padding: 8px 12px;
        background: #2a2a2a;
        border: 1px solid #444;
        color: #fff;
        border-radius: 4px;
        font-size: 12px;
        flex: 0 1 calc(50% - 4px);
      }

      .controls input::placeholder {
        color: #666;
      }

      .controls button {
        padding: 8px 15px;
        background: #667eea;
        border: none;
        color: #fff;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        font-weight: bold;
        flex: 0 1 calc(50% - 4px);
        transition: background 0.2s;
      }

      .controls button:hover {
        background: #5568d3;
      }

      .controls button:active {
        transform: scale(0.98);
      }

      .player2 .controls button {
        background: #f5576c;
      }

      .player2 .controls button:hover {
        background: #e53e57;
      }

      .logs {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        background: #0a0a0a;
        font-size: 12px;
        font-family: "Courier New", monospace;
      }

      .log-entry {
        margin: 8px 0;
        padding: 8px;
        background: #1a1a1a;
        border-left: 3px solid #667eea;
        border-radius: 3px;
      }

      .player2 .log-entry {
        border-left-color: #f5576c;
      }

      .log-entry.sent {
        border-left-color: #4ade80;
        background: #0a2e0a;
      }

      .log-entry.error {
        border-left-color: #ff6b6b;
        background: #2e0a0a;
        color: #ff9999;
      }

      .log-entry.info {
        border-left-color: #60a5fa;
        background: #0a1a2e;
      }

      .log-timestamp {
        color: #666;
        font-size: 11px;
      }

      .game-select {
        padding: 15px;
        background: #0d0d0d;
        border-bottom: 1px solid #333;
      }

      .game-select select {
        width: 100%;
        padding: 8px;
        background: #2a2a2a;
        border: 1px solid #444;
        color: #fff;
        border-radius: 4px;
        cursor: pointer;
      }

      .connected {
        color: #4ade80;
      }

      .disconnected {
        color: #ff6b6b;
      }

      ::-webkit-scrollbar {
        width: 6px;
      }

      ::-webkit-scrollbar-track {
        background: #0a0a0a;
      }

      ::-webkit-scrollbar-thumb {
        background: #444;
        border-radius: 3px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #666;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Player 1 -->
      <div class="player-section">
        <div class="header">🎮 Player 1</div>

        <div class="game-select">
          <select id="game1" onchange="updateGame(1)">
            <option value="">Select Game</option>
            <option value="aviator">Aviator</option>
            <option value="pipshot">PipShot</option>
          </select>
        </div>

        <div class="status">
          <div class="status-item">
            <span class="status-label">Connection:</span>
            <span class="status-value disconnected" id="status1"
              >❌ Disconnected</span
            >
          </div>
          <div class="status-item">
            <span class="status-label">User ID:</span>
            <span class="status-value" id="userId1">Not set</span>
          </div>
          <div class="status-item">
            <span class="status-label">Balance:</span>
            <span class="status-value" id="balance1">$0.00</span>
          </div>
        </div>

        <div class="controls" id="controls1">
          <input
            type="text"
            id="userId1Input"
            placeholder="Enter User ID"
            value="user1"
          />
          <button onclick="connectPlayer(1)">Connect</button>
        </div>

        <div class="logs" id="logs1"></div>
      </div>

      <!-- Player 2 -->
      <div class="player-section">
        <div class="header player2">🎮 Player 2</div>

        <div class="game-select">
          <select id="game2" onchange="updateGame(2)">
            <option value="">Select Game</option>
            <option value="aviator">Aviator</option>
            <option value="pipshot">PipShot</option>
          </select>
        </div>

        <div class="status">
          <div class="status-item">
            <span class="status-label">Connection:</span>
            <span class="status-value disconnected" id="status2"
              >❌ Disconnected</span
            >
          </div>
          <div class="status-item">
            <span class="status-label">User ID:</span>
            <span class="status-value" id="userId2">Not set</span>
          </div>
          <div class="status-item">
            <span class="status-label">Balance:</span>
            <span class="status-value" id="balance2">$0.00</span>
          </div>
        </div>

        <div class="controls" id="controls2">
          <input
            type="text"
            id="userId2Input"
            placeholder="Enter User ID"
            value="user2"
          />
          <button onclick="connectPlayer(2)">Connect</button>
        </div>

        <div class="logs" id="logs2"></div>
      </div>
    </div>

    <script>
      const clients = {
        1: { ws: null, game: null, userId: null },
        2: { ws: null, game: null, userId: null },
      };

      function log(playerNum, message, type = "info") {
        const logsElement = document.getElementById(`logs${playerNum}`);
        const entry = document.createElement("div");
        entry.className = `log-entry ${type}`;
        const timestamp = new Date().toLocaleTimeString();
        entry.innerHTML = `<span class="log-timestamp">[${timestamp}]</span> ${message}`;
        logsElement.appendChild(entry);
        logsElement.scrollTop = logsElement.scrollHeight;
      }

      function updateStatus(playerNum, connected, balance = null) {
        const statusEl = document.getElementById(`status${playerNum}`);
        const balanceEl = document.getElementById(`balance${playerNum}`);
        const userIdEl = document.getElementById(`userId${playerNum}`);

        if (connected) {
          statusEl.textContent = "✅ Connected";
          statusEl.className = "status-value connected";
        } else {
          statusEl.textContent = "❌ Disconnected";
          statusEl.className = "status-value disconnected";
        }

        if (balance !== null) {
          balanceEl.textContent = `$${balance.toFixed(2)}`;
        }

        userIdEl.textContent = clients[playerNum].userId || "Not set";
      }

      function connectPlayer(playerNum) {
        const userId = document.getElementById(`userId${playerNum}Input`).value;
        const game = document.getElementById(`game${playerNum}`).value;

        if (!userId) {
          log(playerNum, "Please enter a User ID", "error");
          return;
        }

        if (!game) {
          log(playerNum, "Please select a game", "error");
          return;
        }

        clients[playerNum].userId = userId;
        clients[playerNum].game = game;

        const wsUrl = `ws://localhost:8080/game/${game}`;
        log(playerNum, `Connecting to ${wsUrl}...`, "info");

        try {
          const ws = new WebSocket(wsUrl);
          clients[playerNum].ws = ws;

          ws.onopen = () => {
            log(playerNum, "✅ WebSocket connected", "info");
            updateStatus(playerNum, true);

            // Send join message
            const joinMsg = { type: "join", userId };
            ws.send(JSON.stringify(joinMsg));
            log(playerNum, `📤 Sent: ${JSON.stringify(joinMsg)}`, "sent");
          };

          ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            log(playerNum, `📥 Received: ${JSON.stringify(data)}`, "info");
          };

          ws.onerror = (error) => {
            log(playerNum, `❌ Error: ${error.message}`, "error");
            updateStatus(playerNum, false);
          };

          ws.onclose = () => {
            log(playerNum, "❌ Disconnected", "error");
            updateStatus(playerNum, false);
          };
        } catch (error) {
          log(playerNum, `❌ Connection failed: ${error.message}`, "error");
        }
      }

      function updateGame(playerNum) {
        const game = document.getElementById(`game${playerNum}`).value;
        if (
          clients[playerNum].ws &&
          clients[playerNum].ws.readyState === WebSocket.OPEN
        ) {
          clients[playerNum].ws.close();
          log(
            playerNum,
            "Closed previous connection. Please reconnect.",
            "info",
          );
          updateStatus(playerNum, false);
          clients[playerNum].ws = null;
        }
      }

      function sendAction(playerNum, action, payload) {
        const ws = clients[playerNum].ws;
        if (!ws || ws.readyState !== WebSocket.OPEN) {
          log(playerNum, "❌ Not connected", "error");
          return;
        }
        const msg = { action, payload };
        ws.send(JSON.stringify(msg));
        log(playerNum, `📤 Sent: ${JSON.stringify(msg)}`, "sent");
      }

      // Add action buttons dynamically based on game selection
      document.getElementById("game1").addEventListener("change", () => {
        updateControlsForGame(1, document.getElementById("game1").value);
      });

      document.getElementById("game2").addEventListener("change", () => {
        updateControlsForGame(2, document.getElementById("game2").value);
      });

      function updateControlsForGame(playerNum, game) {
        const controlsEl = document.getElementById(`controls${playerNum}`);
        const baseHTML = `
                <input type="text" id="userId${playerNum}Input" placeholder="Enter User ID" value="user${playerNum}">
                <button onclick="connectPlayer(${playerNum})">Connect</button>
            `;

        if (game === "aviator") {
          controlsEl.innerHTML =
            baseHTML +
            `
                    <input type="number" id="stake${playerNum}" placeholder="Stake amount" value="10" step="0.1">
                    <button onclick="sendAction(${playerNum}, 'stake', {amount: parseFloat(document.getElementById('stake${playerNum}').value)})">Stake</button>
                    <button onclick="sendAction(${playerNum}, 'cashout', {})">Cashout</button>
                    <button onclick="sendAction(${playerNum}, 'cancel_stake', {})">Cancel Stake</button>
                `;
        } else if (game === "pipshot") {
          controlsEl.innerHTML =
            baseHTML +
            `
                    <input type="number" id="bet${playerNum}" placeholder="Bet amount" value="5" step="0.1">
                    <button onclick="sendAction(${playerNum}, 'lock_bet', {})">Lock Bet</button>
                    <button onclick="sendAction(${playerNum}, 'cancel_bet', {})">Cancel Bet</button>
                    <select id="direction${playerNum}">
                        <option value="up">UP</option>
                        <option value="down">DOWN</option>
                    </select>
                    <button onclick="sendAction(${playerNum}, 'predict', {direction: document.getElementById('direction${playerNum}').value})">Predict</button>
                `;
        }
      }

      log(1, "🎮 Player 1 ready", "info");
      log(2, "🎮 Player 2 ready", "info");
    </script>
  </body>
</html>
