<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Server Test - Advanced Debug</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #1a1a1a;
        color: #fff;
        height: 100vh;
        overflow: hidden;
      }

      .container {
        display: flex;
        height: 100vh;
        gap: 10px;
        padding: 10px;
        background: #0a0a0a;
      }

      .player-section {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: #1a1a1a;
        border: 2px solid #444;
        border-radius: 8px;
        overflow: hidden;
      }

      .header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 15px;
        font-weight: bold;
        font-size: 18px;
        border-bottom: 2px solid #444;
      }

      .header.player2 {
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      }

      .status {
        padding: 10px 15px;
        background: #0d0d0d;
        border-bottom: 1px solid #333;
        font-size: 12px;
      }

      .status-item {
        display: flex;
        justify-content: space-between;
        margin: 5px 0;
      }

      .status-label {
        color: #888;
      }

      .status-value {
        color: #4ade80;
        font-weight: bold;
      }

      .setup-section {
        padding: 12px;
        background: #0d0d0d;
        border-bottom: 1px solid #333;
        display: flex;
        gap: 8px;
      }

      .setup-section input,
      .setup-section select {
        padding: 6px 10px;
        background: #2a2a2a;
        border: 1px solid #444;
        color: #fff;
        border-radius: 4px;
        font-size: 12px;
        flex: 0 1 auto;
      }

      .setup-section button {
        padding: 6px 12px;
        background: #667eea;
        border: none;
        color: #fff;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        font-weight: bold;
        transition: background 0.2s;
      }

      .player2 .setup-section button {
        background: #f5576c;
      }

      .player2 .setup-section button:hover {
        background: #e53e57;
      }

      .setup-section button:hover {
        background: #5568d3;
      }

      .json-input-section {
        padding: 12px;
        background: #0d0d0d;
        border-bottom: 1px solid #333;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .json-input-row {
        display: flex;
        gap: 8px;
      }

      .json-input-section textarea {
        padding: 8px;
        background: #1a1a1a;
        border: 1px solid #444;
        color: #fff;
        border-radius: 4px;
        font-size: 12px;
        font-family: "Courier New", monospace;
        resize: vertical;
        height: 80px;
      }

      .json-input-section button {
        padding: 8px 15px;
        background: #4ade80;
        border: none;
        color: #000;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        font-weight: bold;
        transition: background 0.2s;
      }

      .json-input-section button:hover {
        background: #22c55e;
      }

      .player2 .json-input-section button {
        background: #f5576c;
        color: #fff;
      }

      .player2 .json-input-section button:hover {
        background: #e53e57;
      }

      .filter-section {
        padding: 10px 12px;
        background: #0d0d0d;
        border-bottom: 1px solid #333;
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .filter-section input {
        padding: 6px 10px;
        background: #2a2a2a;
        border: 1px solid #444;
        color: #fff;
        border-radius: 4px;
        font-size: 12px;
        flex: 1;
      }

      .filter-section input::placeholder {
        color: #666;
      }

      .filter-section button {
        padding: 6px 12px;
        background: #60a5fa;
        border: none;
        color: #fff;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        font-weight: bold;
      }

      .filter-section button:hover {
        background: #3b82f6;
      }

      .logs {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
        background: #0a0a0a;
        font-size: 11px;
        font-family: "Courier New", monospace;
      }

      .log-entry {
        margin: 6px 0;
        padding: 8px;
        background: #1a1a1a;
        border-left: 3px solid #667eea;
        border-radius: 3px;
        word-break: break-all;
      }

      .player2 .log-entry {
        border-left-color: #f5576c;
      }

      .log-entry.sent {
        border-left-color: #4ade80;
        background: #0a2e0a;
      }

      .log-entry.error {
        border-left-color: #ff6b6b;
        background: #2e0a0a;
        color: #ff9999;
      }

      .log-entry.info {
        border-left-color: #60a5fa;
        background: #0a1a2e;
      }

      .log-entry.hidden {
        display: none;
      }

      .log-timestamp {
        color: #666;
        font-size: 10px;
      }

      .log-type {
        color: #fbbf24;
        font-weight: bold;
        margin: 0 6px;
      }

      .connected {
        color: #4ade80;
      }

      .disconnected {
        color: #ff6b6b;
      }

      ::-webkit-scrollbar {
        width: 6px;
      }

      ::-webkit-scrollbar-track {
        background: #0a0a0a;
      }

      ::-webkit-scrollbar-thumb {
        background: #444;
        border-radius: 3px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #666;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Player 1 -->
      <div class="player-section">
        <div class="header">🎮 Player 1</div>

        <div class="status">
          <div class="status-item">
            <span class="status-label">Connection:</span>
            <span class="status-value disconnected" id="status1"
              >❌ Disconnected</span
            >
          </div>
          <div class="status-item">
            <span class="status-label">User ID:</span>
            <span class="status-value" id="userId1">Not set</span>
          </div>
          <div class="status-item">
            <span class="status-label">Game:</span>
            <span class="status-value" id="game1">Not selected</span>
          </div>
        </div>

        <div class="setup-section">
          <input
            type="text"
            id="userId1Input"
            placeholder="User ID"
            value="user1"
          />
          <select id="game1Select">
            <option value="">Select Game</option>
            <option value="aviator">Aviator</option>
            <option value="pipshot">PipShot</option>
          </select>
          <button onclick="connectPlayer(1)">Connect</button>
        </div>

        <div class="json-input-section">
          <label style="font-size: 12px; color: #888"
            >📤 Send JSON Message:</label
          >
          <textarea
            id="jsonInput1"
            placeholder='{"type":"join","userId":"user1"}'
            spellcheck="false"
          ></textarea>
          <div class="json-input-row">
            <button onclick="sendJSON(1)">Send Message</button>
          </div>
        </div>

        <div class="filter-section">
          <input
            type="text"
            id="filter1"
            placeholder="Filter logs by type (e.g., 'player_staked', 'error', or leave empty)"
            onkeyup="applyFilter(1)"
          />
          <button onclick="clearLogs(1)">Clear Logs</button>
        </div>

        <div class="logs" id="logs1"></div>
      </div>

      <!-- Player 2 -->
      <div class="player-section">
        <div class="header player2">🎮 Player 2</div>

        <div class="status">
          <div class="status-item">
            <span class="status-label">Connection:</span>
            <span class="status-value disconnected" id="status2"
              >❌ Disconnected</span
            >
          </div>
          <div class="status-item">
            <span class="status-label">User ID:</span>
            <span class="status-value" id="userId2">Not set</span>
          </div>
          <div class="status-item">
            <span class="status-label">Game:</span>
            <span class="status-value" id="game2">Not selected</span>
          </div>
        </div>

        <div class="setup-section">
          <input
            type="text"
            id="userId2Input"
            placeholder="User ID"
            value="user2"
          />
          <select id="game2Select">
            <option value="">Select Game</option>
            <option value="aviator">Aviator</option>
            <option value="pipshot">PipShot</option>
          </select>
          <button onclick="connectPlayer(2)">Connect</button>
        </div>

        <div class="json-input-section">
          <label style="font-size: 12px; color: #888"
            >📤 Send JSON Message:</label
          >
          <textarea
            id="jsonInput2"
            placeholder='{"type":"join","userId":"user2"}'
            spellcheck="false"
          ></textarea>
          <div class="json-input-row">
            <button onclick="sendJSON(2)">Send Message</button>
          </div>
        </div>

        <div class="filter-section">
          <input
            type="text"
            id="filter2"
            placeholder="Filter logs by type (e.g., 'player_staked', 'error', or leave empty)"
            onkeyup="applyFilter(2)"
          />
          <button onclick="clearLogs(2)">Clear Logs</button>
        </div>

        <div class="logs" id="logs2"></div>
      </div>
    </div>

    <script>
      const clients = {
        1: { ws: null, game: "", logs: [], allLogs: [] },
        2: { ws: null, game: "", logs: [], allLogs: [] },
      };

      function connectPlayer(playerNum) {
        const userIdInput = document.getElementById(`userId${playerNum}Input`);
        const gameSelect = document.getElementById(`game${playerNum}Select`);
        const userId = userIdInput.value.trim();
        const game = gameSelect.value;

        if (!userId) {
          log(playerNum, "error", "User ID is required");
          return;
        }

        if (!game) {
          log(playerNum, "error", "Please select a game");
          return;
        }

        // Build WebSocket URL with query parameters
        // Server automatically joins user on connection
        let wsUrl = `ws://localhost:8080?user_id=${encodeURIComponent(userId)}&game_type=${encodeURIComponent(game)}`;

        try {
          const ws = new WebSocket(wsUrl);

          ws.onopen = () => {
            log(playerNum, "event", "⏳ Connected to server (auto-joining...)");
          };

          ws.onmessage = (event) => {
            try {
              const data = JSON.parse(event.data);
              // Handle welcome message (auto-join successful)
              if (data.type === "welcome") {
                log(playerNum, data.type || "message", JSON.stringify(data));

                document.getElementById(`status${playerNum}`).textContent =
                  "🟢 Connected";
                document
                  .getElementById(`status${playerNum}`)
                  .classList.remove("disconnected");
                document.getElementById(`userId${playerNum}`).textContent =
                  userId;
                document.getElementById(`game${playerNum}`).textContent = game;
                gameSelect.disabled = true;
                userIdInput.disabled = true;
              } else {
                // Log all other messages
                log(playerNum, data.type || "message", JSON.stringify(data));
              }
            } catch (e) {
              log(playerNum, "raw", event.data);
            }
          };

          ws.onerror = (error) => {
            log(playerNum, "error", `WebSocket error: ${error.message}`);
          };

          ws.onclose = (event) => {
            const reason = event.reason || "Unknown reason";
            const code = event.code || "Unknown";
            log(
              playerNum,
              "disconnected",
              `❌ Disconnected (${code}: ${reason})`,
            );
            document.getElementById(`status${playerNum}`).textContent =
              "❌ Disconnected";
            document
              .getElementById(`status${playerNum}`)
              .classList.add("disconnected");
            gameSelect.disabled = false;
            userIdInput.disabled = false;
          };

          clients[playerNum].ws = ws;
          clients[playerNum].game = game;
        } catch (error) {
          log(playerNum, "error", `Connection failed: ${error.message}`);
        }
      }

      function sendJSON(playerNum) {
        const textarea = document.getElementById(`jsonInput${playerNum}`);
        const jsonText = textarea.value.trim();

        if (!jsonText) {
          log(playerNum, "warn", "JSON input is empty");
          return;
        }

        if (
          !clients[playerNum].ws ||
          clients[playerNum].ws.readyState !== WebSocket.OPEN
        ) {
          log(playerNum, "error", "Not connected to server");
          return;
        }

        try {
          const jsonData = JSON.parse(jsonText);
          clients[playerNum].ws.send(JSON.stringify(jsonData));
          log(playerNum, "sent", jsonText);
          textarea.value = "";
        } catch (error) {
          log(playerNum, "error", `Invalid JSON: ${error.message}`);
        }
      }

      function applyFilter(playerNum) {
        const filterInput = document.getElementById(`filter${playerNum}`);
        const filterText = filterInput.value.toLowerCase();
        const logsDiv = document.getElementById(`logs${playerNum}`);
        const logEntries = logsDiv.querySelectorAll(".log-entry");

        logEntries.forEach((entry, index) => {
          const logItem = clients[playerNum].allLogs[index];
          if (!logItem) return;

          const messageText = logItem.message.toLowerCase();
          const typeText = logItem.type.toLowerCase();
          const matches =
            messageText.includes(filterText) || typeText.includes(filterText);

          entry.classList.toggle("hidden", !matches && filterText !== "");
        });
      }

      function clearLogs(playerNum) {
        document.getElementById(`logs${playerNum}`).innerHTML = "";
        clients[playerNum].logs = [];
        clients[playerNum].allLogs = [];
      }

      function log(playerNum, type, message) {
        const logsDiv = document.getElementById(`logs${playerNum}`);
        const entry = document.createElement("div");
        entry.className = "log-entry";
        const timestamp = new Date().toLocaleTimeString();
        entry.innerHTML = `<span class="log-time">[${timestamp}]</span> <span class="log-type">${escapeHtml(type)}</span> ${escapeHtml(message)}`;
        logsDiv.appendChild(entry);
        logsDiv.scrollTop = logsDiv.scrollHeight;

        const logItem = { type, message, timestamp };
        clients[playerNum].logs.push(logItem);
        clients[playerNum].allLogs.push(logItem);

        // Check if there's an active filter
        const filterInput = document.getElementById(`filter${playerNum}`);
        if (filterInput && filterInput.value.trim()) {
          applyFilter(playerNum);
        }
      }

      function escapeHtml(text) {
        const map = {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;",
        };
        return text.replace(/[&<>"']/g, (m) => map[m]);
      }

      // Keyboard shortcuts: Ctrl+Enter to send JSON
      document.addEventListener("DOMContentLoaded", () => {
        document
          .getElementById("jsonInput1")
          .addEventListener("keydown", (e) => {
            if (e.ctrlKey && e.key === "Enter") {
              sendJSON(1);
            }
          });
        document
          .getElementById("jsonInput2")
          .addEventListener("keydown", (e) => {
            if (e.ctrlKey && e.key === "Enter") {
              sendJSON(2);
            }
          });
      });
    </script>
  </body>
</html>
